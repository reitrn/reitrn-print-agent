name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Write SSL cert files
        run: |
          $env:SSL_CERT | Out-File -FilePath assets/cert.pem -Encoding utf8NoBOM
          $env:SSL_KEY  | Out-File -FilePath assets/key.pem  -Encoding utf8NoBOM
        env:
          SSL_CERT: ${{ secrets.SSL_CERT }}
          SSL_KEY:  ${{ secrets.SSL_KEY }}

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Delete existing release if it exists
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes 2>$null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: reitrn Print Agent v${{ steps.version.outputs.version }}
          body: |
            ## reitrn Print Agent

            Download and run the installer on your warehouse PC.

            **Requirements:** Windows 10 or 11

            **Setup:**
            1. Run the installer — it installs and launches automatically
            2. Select your **Courier printer** (4×6 labels) and **Barcode printer** (small labels)
            3. The agent starts with Windows automatically
            4. In reitrn hub or app, set Printer Type to **Print Agent**
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
